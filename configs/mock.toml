[runtime]
# 输入 PDF 目录（W1 使用 mock 解析，不会读取真实内容）
input_dir = "/Data_two/wyw/data/TC-DATASYNTH/原始PDF"
# 运行产物目录
output_dir = "./data/out"
# 运行模式（mock/real 等）
mode = "mock"
# 可选：限制处理的文档数量（None 表示处理全部）
doc_limit = 5
limit = 0
# 解析批处理数量（1=流式，0=全量）
parse_batch_size = 1
# 生成批处理数量（1=流式，0=全量）
generate_batch_size = 1
seed = 7
log_level = "INFO"
logs_root_base = "logs"
temp_root_base = "data/temp"
# LLM 配置文件路径
llm_config_path = "configs/llm.toml"

[spec]
# 难度比例分布
difficulty_profile = { easy = 0.3, medium = 0.5, hard = 0.2 }
# 题型比例分布
question_type_mix = { definition = 0.4, factual = 0.3, reasoning = 0.3 }
# 最小参照段落长度
min_evidence_len = 80

[components.sampler]
name = "greedy_addition"
chunk_size = 800
min_sentence_len = 10
write_human_readable = false
paragraph_separators = ["\n\n"]
separators = ["。", "！", "？", ".", "!", "?", ";", "；"]

[components.planner]
name = "simple"
skip_below_evidence_ratio = 0.5

[components.adapter.pdf]
name = "mock_pdf"

[components.adapter.docx]
name = "mock_word"

[components.gate]
name = "simple_composite"
validators = ["simple_schema", "evidence", "label"]
stop_on_first_error = true

[components.validator.evidence]
min_evidence_len = 80

[components.validator.label]
reasoning_min_evidence_len = 80

[components.generator]
name = "mock"
questions_per_doc = 3
