[settings]
timeout = 360  # 6 分钟

# ============ 豆包系列 ============
[models.doubao_seed_medium]
model = "doubao-seed-1-6-251015"
model_provider = "openai"
temperature = 0
base_url_env = "DOUBAO_BASEURL"
api_key_env = "DOUBAO_APIKEY_FS_AGENT"
max_completion_tokens = 64000
reasoning_effort = "medium"
[models.doubao_seed_medium.extra_body]
thinking = { type = "enabled" }

[models.doubao_seed_low]
model = "doubao-seed-1-6-251015"
model_provider = "openai"
temperature = 0
base_url_env = "DOUBAO_BASEURL"
api_key_env = "DOUBAO_APIKEY_FS_AGENT"
max_completion_tokens = 64000
reasoning_effort = "low"
[models.doubao_seed_low.extra_body]
thinking = { type = "enabled" }

[models.doubao_flash]
model = "doubao-seed-1-6-flash"
model_provider = "openai"
temperature = 0
base_url_env = "DOUBAO_BASEURL"
api_key_env = "DOUBAO_APIKEY_FS_AGENT"
max_completion_tokens = 64000

[models.doubao_lite_medium]
model = "doubao-seed-1-6-lite-251015"
model_provider = "openai"
temperature = 0
base_url_env = "DOUBAO_BASEURL"
api_key_env = "DOUBAO_APIKEY_FS_AGENT"
max_completion_tokens = 64000
reasoning_effort = "medium"

[models.doubao_lite_low]
model = "doubao-seed-1-6-lite-251015"
model_provider = "openai"
temperature = 0
base_url_env = "DOUBAO_BASEURL"
api_key_env = "DOUBAO_APIKEY_FS_AGENT"
max_completion_tokens = 64000
reasoning_effort = "low"

# ============ GPT 系列 ============
[models.gpt_medium]
model = "gpt-5"
model_provider = "openai"
temperature = 0
base_url_env = "BASEURL_FS"
api_key_env = "OPENAI_APIKEY_FS"
reasoning_effort = "medium"

[models.gpt_low]
model = "gpt-5"
model_provider = "openai"
temperature = 0
base_url_env = "BASEURL_FS"
api_key_env = "OPENAI_APIKEY_FS"
reasoning_effort = "low"

# ============ 通义千问系列 ============
[models.qwen_max]
model = "qwen3-max-preview"
model_provider = "openai"
temperature = 0
base_url_env = "QWEN_BASEURL"
api_key_env = "QWEN_APIKEY_FS"
stream = true
[models.qwen_max.extra_body]
enable_thinking = true

[models.qwen_plus]
model = "qwen-plus"
model_provider = "openai"
temperature = 0
base_url_env = "QWEN_BASEURL"
api_key_env = "QWEN_APIKEY_FS"
stream = true
[models.qwen_plus.extra_body]
enable_thinking = true

[models.qwen_flash]
model = "qwen-flash"
model_provider = "openai"
temperature = 0
base_url_env = "QWEN_BASEURL"
api_key_env = "QWEN_APIKEY_FS"
stream = true
[models.qwen_flash.extra_body]
enable_thinking = true
[models.qwen_flash.extra_headers]
X-DashScope-DataInspection = '{"input":"disable","output":"disable"}'