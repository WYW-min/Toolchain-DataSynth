[settings]
timeout = 360  # 6 分钟
# ====== 固定错误模型测试 ======
[models.name-error]
model = "doubao-se"
model_provider = "openai"
temperature = 0
base_url_env = "DOUBAO_BASEURL"
api_key_env = "DOUBAO_APIKEY_FS_AGENT"
max_completion_tokens = 64000
reasoning_effort = "medium"



[models.apikey-error]
model = "doubao-seed-1-6-251015"
model_provider = "openai"
temperature = 0
base_url_env = "DOUBAO_BASEURL"
